<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node-Watch Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .status-healthy { background-color: #10b981; }
        .status-warning { background-color: #f59e0b; }
        .status-critical { background-color: #ef4444; }
        .pulse-animation { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <h1 class="text-2xl font-bold text-gray-900">Node-Watch Dashboard</h1>
                        <div id="refreshIndicator" class="ml-4 flex items-center text-sm text-gray-500">
                            <div class="w-2 h-2 bg-green-500 rounded-full mr-2"></div>
                            <span>Auto-refresh: 30s</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div id="lastUpdate" class="text-sm text-gray-500"></div>
                        <button id="refreshBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium">
                            Refresh Now
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Loading State -->
            <div id="loadingState" class="flex justify-center items-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                <span class="ml-3 text-gray-600">Loading servers...</span>
            </div>

            <!-- Error State -->
            <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-md p-4 mb-6">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">Connection Error</h3>
                        <div class="mt-2 text-sm text-red-700">
                            <p id="errorMessage">Unable to connect to the API server. Please check if the service is running.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Server Grid -->
            <div id="serverGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-8">
                <!-- Server cards will be dynamically inserted here -->
            </div>
        </main>

        <!-- Detailed View Modal -->
        <div id="detailModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
            <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-6xl shadow-lg rounded-md bg-white">
                <div class="flex justify-between items-center pb-4 border-b">
                    <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Server Details</h3>
                    <button id="closeModal" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="mt-4">
                    <!-- Modal content will be dynamically inserted here -->
                    <div id="modalContent" class="space-y-6">
                        <!-- Charts and detailed info -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class NodeWatchDashboard {
            constructor() {
                this.apiBase = 'http://localhost:9081/api/v1';
                this.servers = [];
                this.refreshInterval = null;
                this.charts = {};
                
                this.init();
            }

            async init() {
                this.setupEventListeners();
                await this.loadServers();
                this.startAutoRefresh();
            }

            setupEventListeners() {
                document.getElementById('refreshBtn').addEventListener('click', () => this.loadServers());
                document.getElementById('closeModal').addEventListener('click', () => this.closeDetailModal());
                
                // Close modal when clicking outside
                document.getElementById('detailModal').addEventListener('click', (e) => {
                    if (e.target.id === 'detailModal') {
                        this.closeDetailModal();
                    }
                });
            }

            async loadServers() {
                try {
                    this.showLoading();
                    this.hideError();

                    const response = await fetch(`${this.apiBase}/servers`);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    this.servers = data.servers || [];
                    
                    this.renderServerGrid();
                    this.updateLastUpdateTime();
                    this.hideLoading();
                    
                } catch (error) {
                    console.error('Failed to load servers:', error);
                    this.showError(error.message);
                    this.hideLoading();
                }
            }

            showLoading() {
                document.getElementById('loadingState').classList.remove('hidden');
                document.getElementById('serverGrid').classList.add('hidden');
            }

            hideLoading() {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('serverGrid').classList.remove('hidden');
            }

            showError(message) {
                document.getElementById('errorMessage').textContent = message;
                document.getElementById('errorState').classList.remove('hidden');
            }

            hideError() {
                document.getElementById('errorState').classList.add('hidden');
            }

            updateLastUpdateTime() {
                const now = new Date();
                document.getElementById('lastUpdate').textContent = 
                    `Last updated: ${now.toLocaleTimeString()}`;
            }

            getServerStatus(server) {
                if (!server.metrics) return 'critical';
                
                const { cpu, memory, disk } = server.metrics;
                const cpuUsage = cpu?.usage || 0;
                const memoryUsage = memory?.usage_percent || 0;
                const diskUsage = disk?.usage_percent || 0;

                // Critical thresholds
                if (cpuUsage > 90 || memoryUsage > 95 || diskUsage > 95) {
                    return 'critical';
                }
                
                // Warning thresholds
                if (cpuUsage > 70 || memoryUsage > 80 || diskUsage > 85) {
                    return 'warning';
                }
                
                return 'healthy';
            }

            formatLastSeen(timestamp) {
                if (!timestamp) return 'Never';
                const date = new Date(timestamp);
                const now = new Date();
                const diffMs = now - date;
                const diffMinutes = Math.floor(diffMs / 60000);
                
                if (diffMinutes < 1) return 'Just now';
                if (diffMinutes < 60) return `${diffMinutes}m ago`;
                if (diffMinutes < 1440) return `${Math.floor(diffMinutes / 60)}h ago`;
                return `${Math.floor(diffMinutes / 1440)}d ago`;
            }

            renderServerGrid() {
                const grid = document.getElementById('serverGrid');
                grid.innerHTML = '';

                if (this.servers.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12 text-gray-500">
                            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2" />
                            </svg>
                            <p>No servers found</p>
                        </div>
                    `;
                    return;
                }

                this.servers.forEach(server => {
                    const status = this.getServerStatus(server);
                    const metrics = server.metrics || {};
                    
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow cursor-pointer';
                    card.addEventListener('click', () => this.showServerDetails(server));

                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-900">${server.hostname}</h3>
                            <div class="flex items-center">
                                <div class="status-indicator status-${status} ${status === 'healthy' ? 'pulse-animation' : ''}"></div>
                                <span class="ml-2 text-sm text-gray-600 capitalize">${status}</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-600">Last Seen:</span>
                                <span class="font-medium">${this.formatLastSeen(server.last_seen)}</span>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-600">CPU:</span>
                                    <span class="font-medium">${(metrics.cpu?.usage || 0).toFixed(1)}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-blue-500 h-2 rounded-full" style="width: ${metrics.cpu?.usage || 0}%"></div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-600">Memory:</span>
                                    <span class="font-medium">${(metrics.memory?.usage_percent || 0).toFixed(1)}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-green-500 h-2 rounded-full" style="width: ${metrics.memory?.usage_percent || 0}%"></div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-gray-600">Disk:</span>
                                    <span class="font-medium">${(metrics.disk?.usage_percent || 0).toFixed(1)}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-orange-500 h-2 rounded-full" style="width: ${metrics.disk?.usage_percent || 0}%"></div>
                                </div>
                            </div>
                        </div>
                    `;

                    grid.appendChild(card);
                });
            }

            async showServerDetails(server) {
                document.getElementById('modalTitle').textContent = `${server.hostname} - Detailed Metrics`;
                
                try {
                    // Fetch historical data for charts
                    const response = await fetch(`${this.apiBase}/servers/${server.id}/history?hours=24`);
                    const historyData = response.ok ? await response.json() : { history: [] };

                    this.renderModalContent(server, historyData.history || []);
                    document.getElementById('detailModal').classList.remove('hidden');
                    
                } catch (error) {
                    console.error('Failed to load server history:', error);
                    this.renderModalContent(server, []);
                    document.getElementById('detailModal').classList.remove('hidden');
                }
            }

            renderModalContent(server, history) {
                const modalContent = document.getElementById('modalContent');
                const metrics = server.metrics || {};
                
                modalContent.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <!-- Current Status -->
                        <div class="bg-gray-50 p-6 rounded-lg">
                            <h4 class="text-lg font-semibold mb-4">Current Status</h4>
                            <div class="space-y-4">
                                <div class="flex justify-between">
                                    <span>Status:</span>
                                    <div class="flex items-center">
                                        <div class="status-indicator status-${this.getServerStatus(server)} mr-2"></div>
                                        <span class="capitalize">${this.getServerStatus(server)}</span>
                                    </div>
                                </div>
                                <div class="flex justify-between">
                                    <span>Last Seen:</span>
                                    <span>${this.formatLastSeen(server.last_seen)}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Uptime:</span>
                                    <span>${metrics.uptime || 'Unknown'}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Load Average:</span>
                                    <span>${metrics.load_average?.join(', ') || 'N/A'}</span>
                                </div>
                            </div>
                        </div>

                        <!-- System Info -->
                        <div class="bg-gray-50 p-6 rounded-lg">
                            <h4 class="text-lg font-semibold mb-4">System Information</h4>
                            <div class="space-y-4">
                                <div class="flex justify-between">
                                    <span>OS:</span>
                                    <span>${server.os || 'Unknown'}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Architecture:</span>
                                    <span>${server.arch || 'Unknown'}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Total Memory:</span>
                                    <span>${this.formatBytes(metrics.memory?.total || 0)}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span>Total Disk:</span>
                                    <span>${this.formatBytes(metrics.disk?.total || 0)}</span>
                                </div>
                            </div>
                        </div>

                        <!-- CPU Usage Chart -->
                        <div class="bg-white p-6 rounded-lg border">
                            <h4 class="text-lg font-semibold mb-4">CPU Usage (24h)</h4>
                            <canvas id="cpuChart" height="100"></canvas>
                        </div>

                        <!-- Memory Usage Chart -->
                        <div class="bg-white p-6 rounded-lg border">
                            <h4 class="text-lg font-semibold mb-4">Memory Usage (24h)</h4>
                            <canvas id="memoryChart" height="100"></canvas>
                        </div>

                        <!-- Disk Usage Chart -->
                        <div class="bg-white p-6 rounded-lg border">
                            <h4 class="text-lg font-semibold mb-4">Disk Usage (24h)</h4>
                            <canvas id="diskChart" height="100"></canvas>
                        </div>

                        <!-- Network Usage Chart -->
                        <div class="bg-white p-6 rounded-lg border">
                            <h4 class="text-lg font-semibold mb-4">Network Usage (24h)</h4>
                            <canvas id="networkChart" height="100"></canvas>
                        </div>

                        <!-- Top Processes -->
                        <div class="lg:col-span-2 bg-gray-50 p-6 rounded-lg">
                            <h4 class="text-lg font-semibold mb-4">Top Processes</h4>
                            <div class="overflow-x-auto">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <thead class="bg-gray-100">
                                        <tr>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">PID</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">CPU %</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Memory %</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y divide-gray-200">
                                        ${this.renderProcessList(metrics.processes || [])}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;

                // Render charts after DOM is ready
                setTimeout(() => {
                    this.renderCharts(history);
                }, 100);
            }

            renderProcessList(processes) {
                if (!processes.length) {
                    return '<tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No process data available</td></tr>';
                }

                return processes.slice(0, 10).map(proc => `
                    <tr>
                        <td class="px-4 py-2 text-sm">${proc.pid}</td>
                        <td class="px-4 py-2 text-sm font-medium">${proc.name}</td>
                        <td class="px-4 py-2 text-sm">${(proc.cpu || 0).toFixed(1)}%</td>
                        <td class="px-4 py-2 text-sm">${(proc.memory || 0).toFixed(1)}%</td>
                    </tr>
                `).join('');
            }

            renderCharts(history) {
                // Destroy existing charts
                Object.values(this.charts).forEach(chart => chart.destroy());
                this.charts = {};

                const labels = history.map(point => new Date(point.timestamp).toLocaleTimeString());
                
                // CPU Chart
                this.charts.cpu = new Chart(document.getElementById('cpuChart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'CPU Usage %',
                            data: history.map(point => point.metrics?.cpu?.usage || 0),
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: this.getChartOptions('CPU Usage (%)')
                });

                // Memory Chart
                this.charts.memory = new Chart(document.getElementById('memoryChart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Memory Usage %',
                            data: history.map(point => point.metrics?.memory?.usage_percent || 0),
                            borderColor: 'rgb(16, 185, 129)',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: this.getChartOptions('Memory Usage (%)')
                });

                // Disk Chart
                this.charts.disk = new Chart(document.getElementById('diskChart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Disk Usage %',
                            data: history.map(point => point.metrics?.disk?.usage_percent || 0),
                            borderColor: 'rgb(245, 158, 11)',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: this.getChartOptions('Disk Usage (%)')
                });

                // Network Chart
                this.charts.network = new Chart(document.getElementById('networkChart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Bytes In',
                                data: history.map(point => point.metrics?.network?.bytes_in || 0),
                                borderColor: 'rgb(139, 69, 19)',
                                backgroundColor: 'rgba(139, 69, 19, 0.1)',
                                tension: 0.4
                            },
                            {
                                label: 'Bytes Out',
                                data: history.map(point => point.metrics?.network?.bytes_out || 0),
                                borderColor: 'rgb(220, 38, 127)',
                                backgroundColor: 'rgba(220, 38, 127, 0.1)',
                                tension: 0.4
                            }
                        ]
                    },
                    options: this.getChartOptions('Network Usage (Bytes)')
                });
            }

            getChartOptions(title) {
                return {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        title: {
                            display: false
                        }
                    }
                };
            }

            closeDetailModal() {
                document.getElementById('detailModal').classList.add('hidden');
                // Destroy charts to prevent memory leaks
                Object.values(this.charts).forEach(chart => chart.destroy());
                this.charts = {};
            }

            formatBytes(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            startAutoRefresh() {
                // Clear existing interval
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                }

                // Start new interval
                this.refreshInterval = setInterval(() => {
                    this.loadServers();
                }, 30000); // 30 seconds

                // Update refresh indicator
                this.updateRefreshIndicator();
            }

            updateRefreshIndicator() {
                const indicator = document.getElementById('refreshIndicator');
                const dot = indicator.querySelector('div');
                
                // Animate the indicator dot
                setInterval(() => {
                    dot.classList.toggle('pulse-animation');
                }, 1000);
            }
        }

        // Initialize the dashboard when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new NodeWatchDashboard();
        });

        // Handle page visibility changes to pause/resume auto-refresh
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Page is hidden, you could pause refresh here if needed
            } else {
                // Page is visible again, ensure refresh is running
                if (window.dashboard) {
                    window.dashboard.loadServers();
                }
            }
        });
    </script>
</body>
</html>
