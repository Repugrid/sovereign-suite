version: '3.8'

services:
  node-watch-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-watch-api
    ports:
      - "9081:9081"
    environment:
      - API_KEY=${API_KEY:-nodewatch-secret-key-2024}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  data:
    driver: local
  logs:
    driver: local