server {
    listen 80;
    server_name _;

    # No caching
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;

    # Public: Landing pages and deployed sites
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Protected: Due Diligence Data Room (M&A Standard)
    location /data-room/ {
        alias /usr/share/nginx/data-room/;
        auth_basic "Sovereign-Node-Watch | Confidential Data Room";
        auth_basic_user_file /etc/nginx/.htpasswd;
        autoindex on;
        autoindex_format html;
        autoindex_localtime on;

        # Professional directory listing style
        add_header X-Data-Room-Version "1.0";
        add_header X-Confidentiality "Restricted — Authorized Investors Only";
    }
}
