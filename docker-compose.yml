services:
  ceo-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sovereign-ceo
    env_file:
      - .env
    volumes:
      - ./shared:/root/sovereign/shared
      - ./logs:/root/sovereign/logs
      - ./config:/root/sovereign/config:ro
      - ./agents:/root/sovereign/agents:ro
      - ./deployments:/root/sovereign/deployments
      # Docker socket so CEO can spawn worker containers
      - /var/run/docker.sock:/var/run/docker.sock
      # .env needed by spawner to pass to workers
      - ./.env:/root/sovereign/.env:ro
    restart: on-failure
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 2G

  nodewatch-api:
    build:
      context: ./services/nodewatch-api
    container_name: sovereign-nodewatch-api
    volumes:
      - ./data/nodewatch:/app/data
    env_file:
      - .env
    environment:
      - API_KEY=nw-live-2026-sovereign
    ports:
      - "9081:9081"
    restart: unless-stopped
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 512M

  telegram-chat:
    build:
      context: ./services/telegram-chat
    container_name: sovereign-telegram
    env_file:
      - .env
    environment:
      - NODEWATCH_API=http://sovereign-nodewatch-api:9081
      - N8N_WEBHOOK=http://n8n:5678/webhook/telegram-commands
      - SHARED_DIR=/data/shared
      - CHAT_MODEL=claude-sonnet-4-20250514
    volumes:
      - ./shared:/data/shared:ro
      - ./logs:/data/logs:ro
      - ./data/telegram:/data
    restart: unless-stopped
    networks:
      - sovereign-net
      - repugrid-net
    deploy:
      resources:
        limits:
          memory: 256M

  webserver:
    image: nginx:alpine
    container_name: sovereign-web
    volumes:
      - ./deployments:/usr/share/nginx/html:ro
      - ./shared/results/DATA_ROOM:/usr/share/nginx/data-room:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/.htpasswd:/etc/nginx/.htpasswd:ro
    ports:
      - "9080:80"
    restart: unless-stopped
    networks:
      - sovereign-net
      - repugrid-net
    labels:
      - "traefik.enable=false"

networks:
  sovereign-net:
    driver: bridge
  repugrid-net:
    external: true
    name: repugrid_repugrid-net
